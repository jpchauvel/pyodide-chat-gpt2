<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pyodide Chat App</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            max-width: 640px;
            margin: 2rem auto;
            padding: 0 1rem;
            color: #1a1a1a;
        }
        h1 {
            font-size: 1.4rem;
            margin-bottom: 0.25rem;
        }
        #subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        #status {
            padding: 0.6rem 0.8rem;
            background: #f4f4f7;
            border: 1px solid #e0e0e6;
            border-radius: 6px;
            font-size: 0.9rem;
            color: #444;
            margin-bottom: 1rem;
        }
        #chatbox {
            border: 1px solid #d0d0d6;
            border-radius: 6px;
            height: 360px;
            overflow-y: auto;
            padding: 0.75rem;
            margin-bottom: 0.75rem;
            background: #fff;
        }
        .msg {
            padding: 0.5rem 0.75rem;
            margin-bottom: 0.5rem;
            border-radius: 6px;
            line-height: 1.4;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .msg.you {
            background: #e8f0ff;
            border-left: 3px solid #4a7dff;
        }
        .msg.ai {
            background: #f4f4f7;
            border-left: 3px solid #888;
        }
        .msg.err {
            background: #fdecea;
            border-left: 3px solid #d33;
            color: #8a1c1c;
        }
        #input-row {
            display: flex;
            gap: 0.5rem;
        }
        #user-input {
            flex: 1;
            padding: 0.5rem 0.75rem;
            border: 1px solid #d0d0d6;
            border-radius: 6px;
            font-size: 1rem;
        }
        #send-button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            background: #4a7dff;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }
        #send-button:disabled {
            background: #aac;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<h1>Pyodide Chat</h1>
<div id="subtitle">Python (via Pyodide) + OpenRouter, all in your browser.</div>

<div id="status">Initializing…</div>

<div id="app" hidden>
    <div id="chatbox"></div>
    <div id="input-row">
        <input id="user-input" type="text" placeholder="Type a message and press Enter…" autocomplete="off" />
        <button id="send-button">Send</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/pyodide/v0.29.4/full/pyodide.js"></script>
<script src="python.js"></script>
</body>
</html>
